name = "test-tracker"
compatibility_date = "2026-04-01"
pages_build_output_dir = "./dist"

# Cloudflare D1 binding consumed by Pages Functions under ctx.env.DB
[[d1_databases]]
binding = "DB"
database_name = "test-tracker"
database_id = "8cdb6343-233a-4d90-b242-8bfd497b1660"
migrations_dir = "migrations"

# Local dev (wrangler pages dev) will use a local SQLite file at .wrangler/state/d1
[vars]
ENVIRONMENT = "development"
